<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>地道英语·场景学习（随机练习句版）</title>
  <style>
    /* 样式与之前完全一致，保持简洁 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: white;
      font-family: system-ui, -apple-system, 'Helvetica Neue', 'Arial', sans-serif;
      line-height: 1.5;
      color: #222;
      padding: 2rem 1.5rem;
      max-width: 700px;
      margin: 0 auto;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 2rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid #f0f0f0;
    }
    .recommendation {
      font-size: 0.85rem;
      color: #aaa;
      cursor: pointer;
      transition: color 0.2s;
    }
    .recommendation:hover {
      color: #666;
    }
    .proficiency {
      font-size: 1rem;
      font-weight: 400;
      color: #2c3e50;
      background: #f8f9fa;
      padding: 0.2rem 0.8rem;
      border-radius: 30px;
      border: 1px solid #eaecef;
    }
    .category-list {
      list-style: none;
      margin-top: 1rem;
    }
    .category-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2rem 1rem;
      margin: 2px 0;
      border-radius: 16px;
      cursor: pointer;
      transition: background 0.2s;
      border-bottom: 1px solid #f0f0f0;
      font-size: 1.3rem;
      font-weight: 400;
    }
    .category-item:hover {
      background: #fafafa;
    }
    .category-badge {
      background: #e9ecef;
      border-radius: 30px;
      padding: 0.2rem 0.8rem;
      font-size: 0.9rem;
      color: #495057;
    }
    .scene-list {
      list-style: none;
      margin-top: 1rem;
    }
    .scene-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 0.8rem;
      margin: 2px 0;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s;
      border-bottom: 1px solid #f5f5f5;
    }
    .scene-item:hover {
      background: #fafafa;
    }
    .scene-name {
      font-size: 1.2rem;
      font-weight: 400;
    }
    .weak-dot {
      color: #ffb347;
      font-size: 1.4rem;
      line-height: 1;
      opacity: 0.8;
      margin-left: 8px;
    }
    .back-btn {
      display: inline-block;
      margin-bottom: 2rem;
      color: #888;
      text-decoration: none;
      font-size: 0.95rem;
      cursor: pointer;
      border: 1px solid #e0e0e0;
      padding: 0.3rem 1rem;
      border-radius: 30px;
      transition: all 0.2s;
    }
    .back-btn:hover {
      background: #f5f5f5;
      color: #333;
    }
    .detail-title {
      font-size: 2rem;
      font-weight: 350;
      margin-bottom: 1rem;
      letter-spacing: -0.02em;
    }
    .difficulty-bar {
      display: flex;
      gap: 0.8rem;
      margin-bottom: 2rem;
      justify-content: center;
    }
    .difficulty-dot {
      width: 40px;
      height: 40px;
      border-radius: 40px;
      background: white;
      border: 2px solid #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      font-weight: 500;
      color: #7f8c8d;
      cursor: pointer;
      transition: all 0.2s;
    }
    .difficulty-dot.active {
      background: #2c3e50;
      border-color: #2c3e50;
      color: white;
    }
    .extra-buttons {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .extra-btn {
      flex: 1;
      background: white;
      border: 1.5px solid #e0e0e0;
      border-radius: 60px;
      padding: 0.8rem 0.5rem;
      font-size: 1.2rem;
      font-weight: 400;
      color: #2c3e50;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    .extra-btn:hover {
      background: #f9f9f9;
      border-color: #ccc;
    }
    .translation-panel, .dict-panel {
      background: #f0f7ff;
      border: 1px solid #d0e0f0;
      border-radius: 24px;
      padding: 1.2rem;
      margin: 1rem 0 2rem 0;
      font-size: 1rem;
      color: #1a3a5e;
      display: none;
      white-space: pre-wrap;
    }
    .dict-panel {
      background: #fff0e6;
      border-color: #ffccaa;
      color: #5a3a2a;
    }
    .translation-panel.show, .dict-panel.show {
      display: block;
    }
    .button-group {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      margin: 1rem 0 3rem;
    }
    .action-btn {
      background: white;
      border: 1.5px solid #e0e0e0;
      border-radius: 60px;
      padding: 1.2rem 1rem;
      font-size: 1.4rem;
      font-weight: 400;
      color: #2c3e50;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.02);
    }
    .action-btn:hover {
      background: #f9f9f9;
      border-color: #ccc;
    }
    .action-btn small {
      font-size: 0.9rem;
      color: #7f8c8d;
      display: block;
      margin-top: 4px;
    }
    .dialog-box {
      background: #fbfbfb;
      border: 1px solid #ececec;
      border-radius: 24px;
      padding: 1.8rem;
      margin: 1.5rem 0;
      font-size: 1.1rem;
      line-height: 1.7;
      max-height: 400px;
      overflow-y: auto;
      color: #1a2634;
    }
    .dialogue-line {
      margin-bottom: 1rem;
    }
    .speaker {
      font-weight: 600;
      color: #2c3e50;
      margin-right: 10px;
    }
    .practice-panel {
      background: #ffffff;
      border: 1px solid #eaeaea;
      border-radius: 32px;
      padding: 2rem 1.5rem;
      margin-top: 2rem;
      box-shadow: 0 8px 20px rgba(0,0,0,0.02);
    }
    .target-sentence {
      font-size: 1.4rem;
      font-weight: 400;
      background: #f4f6f9;
      padding: 1.2rem;
      border-radius: 40px;
      text-align: center;
      margin-bottom: 2rem;
      border: 1px solid #e9eef2;
      word-wrap: break-word;
      overflow-wrap: break-word;
      white-space: normal;
      hyphens: auto;
    }
    .record-btn {
      background: #2c3e50;
      border: none;
      color: white;
      font-size: 1.2rem;
      padding: 1rem 2rem;
      border-radius: 60px;
      width: 100%;
      cursor: pointer;
      transition: background 0.2s;
      margin-bottom: 1.5rem;
    }
    .record-btn:disabled {
      background: #b0bec5;
      cursor: not-allowed;
    }
    .record-btn.recording {
      background: #e67e22;
      animation: pulse 1.2s infinite;
    }
    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.8; }
      100% { opacity: 1; }
    }
    .recognition-result {
      background: #f8f9fa;
      border-radius: 30px;
      padding: 1.2rem;
      font-size: 1rem;
      border: 1px solid #dee2e6;
    }
    .recognition-text {
      font-weight: 500;
      margin-bottom: 0.5rem;
    }
    .score-badge {
      display: inline-block;
      padding: 0.3rem 1rem;
      border-radius: 30px;
      font-size: 0.9rem;
      font-weight: 500;
    }
    .score-excellent { background: #d4edda; color: #155724; }
    .score-good { background: #fff3cd; color: #856404; }
    .score-tryagain { background: #f8d7da; color: #721c24; }
    .hidden {
      display: none !important;
    }
    .error-tip {
      text-align: center;
      color: #999;
      padding: 2rem;
      font-size: 1.1rem;
    }
    .category-header {
      font-size: 1.5rem;
      font-weight: 350;
      margin-bottom: 1rem;
    }
    .loading-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #3498db;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-left: 10px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- 头部：今日推荐 & 地道度 -->
    <div class="header">
      <span class="recommendation" id="recommendationText">今日推荐：加载中…</span>
      <span class="proficiency" id="proficiencyDisplay">地道度 60%</span>
    </div>

    <!-- 分类列表首页 -->
    <div id="categoryHomeView">
      <ul class="category-list" id="categoryList"></ul>
    </div>

    <!-- 分类详情视图 (某分类下的场景列表) -->
    <div id="categoryDetailView" class="hidden">
      <span class="back-btn" id="backToCategoriesBtn">← 所有分类</span>
      <h2 class="category-header" id="currentCategoryName"></h2>
      <ul class="scene-list" id="categorySceneList"></ul>
    </div>

    <!-- 场景详情视图 -->
    <div id="detailView" class="hidden">
      <span class="back-btn" id="backBtn">← 返回</span>
      <h2 class="detail-title" id="detailSceneName"></h2>

      <!-- 难度切换圆点 -->
      <div class="difficulty-bar" id="difficultyBar">
        <span class="difficulty-dot" data-diff="beginner">初</span>
        <span class="difficulty-dot active" data-diff="intermediate">中</span>
        <span class="difficulty-dot" data-diff="advanced">高</span>
      </div>

      <!-- 翻译和词典按钮（与主按钮同一界面） -->
      <div class="extra-buttons">
        <button class="extra-btn" id="translateBtn">🔤 翻译</button>
        <button class="extra-btn" id="dictBtn">🔍 查词典</button>
      </div>

      <!-- 翻译和词典面板 -->
      <div id="translationPanel" class="translation-panel"></div>
      <div id="dictPanel" class="dict-panel"></div>

      <!-- 三个主按钮 -->
      <div class="button-group">
        <button class="action-btn" id="listenBtn">👂 听对话 <small>TTS 双人角色播报</small></button>
        <button class="action-btn" id="readBtn">📖 读文本</button>
        <button class="action-btn" id="practiceBtn">🎤 练口语</button>
      </div>

      <!-- 读文本区域 (默认隐藏) -->
      <div id="readPanel" class="dialog-box hidden"></div>

      <!-- 练口语面板 (默认隐藏) -->
      <div id="practicePanel" class="practice-panel hidden">
        <div class="target-sentence" id="targetSentence">I'd like a latte.</div>
        <button class="record-btn" id="recordButton">🎙️ 开始录音</button>
        <div id="recognitionOutput" class="recognition-result hidden">
          <div class="recognition-text" id="recognizedText"></div>
          <div id="scoreDisplay"></div>
        </div>
        <p style="color:#aaa; font-size:0.8rem; margin-top:1rem; text-align:center;">点击按钮，允许麦克风，然后朗读上方句子</p>
      </div>
    </div>
  </div>

  <script>
    (function() {
      document.addEventListener('DOMContentLoaded', function() {
        try {
          if (window.speechSynthesis) {
            try { window.speechSynthesis.getVoices(); } catch (e) {}
          }

          // ---------- 完整31个场景数据，每个难度3个版本（全部用单引号包裹）----------
          const scenes = [
            // 0: 在咖啡店点单
            {
              name: "在咖啡店点单",
              level: "★",
              variations: {
                beginner: [
                  { dialogue: 'A: "Hi, can I get a latte?" B: "Sure, for here or to go?" A: "For here." B: "Size?" A: "Medium." B: "Anything else?" A: "No." B: "$4.50."' },
                  { dialogue: 'A: "I\'d like a cappuccino." B: "Small, medium or large?" A: "Large." B: "For here?" A: "To go." B: "$5.20."' },
                  { dialogue: 'A: "A hot chocolate, please." B: "Whipped cream?" A: "Yes." B: "Small?" A: "Small." B: "$3.75."' }
                ],
                intermediate: [
                  { dialogue: 'A: "I\'d like a latte with oat milk." B: "For here or to go?" A: "For here, with room for cream." B: "Got it. $5.25."' },
                  { dialogue: 'A: "Could I have a flat white?" B: "Certainly. Size?" A: "Medium." B: "For here?" A: "Yes." B: "$4.90."' },
                  { dialogue: 'A: "I\'ll take a caramel macchiato." B: "Hot or iced?" A: "Iced." B: "Large?" A: "Yes." B: "$6.10."' }
                ],
                advanced: [
                  { dialogue: 'A: "Hey, can I get a dirty chai latte with a double shot?" B: "You got it. For here or to go?" A: "To go." B: "That\'s $6.75."' },
                  { dialogue: 'A: "I\'ll have a cortado with oat milk." B: "Sure thing. $4.20."' },
                  { dialogue: 'A: "What\'s your strongest brew?" B: "Our cold brew is pretty intense." A: "I\'ll take a large black." B: "$4.95."' }
                ]
              }
            },
            // 1: 快餐店点餐
            {
              name: "快餐店点餐",
              level: "★",
              variations: {
                beginner: [
                  { dialogue: 'A: "Welcome to Burger King, may I take your order?" B: "Yeah, can I get a Whopper meal?" A: "What drink?" B: "Coke." A: "$8.99."' },
                  { dialogue: 'A: "Hi, I\'d like a cheeseburger." B: "Just the burger?" A: "Yes." B: "$3.49."' },
                  { dialogue: 'A: "Can I have a 10-piece chicken nuggets?" B: "Sauces?" A: "Barbecue." B: "$4.99."' }
                ],
                intermediate: [
                  { dialogue: 'A: "I\'d like a double cheeseburger meal with large fries." B: "Drink?" A: "Root beer." B: "$9.50."' },
                  { dialogue: 'A: "Can I get a spicy chicken sandwich with cheese?" B: "Sure. $5.29."' },
                  { dialogue: 'A: "I\'ll have a baconator combo with onion rings." B: "Drink?" A: "Dr Pepper." B: "$11.20."' }
                ],
                advanced: [
                  { dialogue: 'A: "Hey, can I get a Whopper with no pickles, extra onions, and onion rings?" B: "Sure. $9.99."' },
                  { dialogue: 'A: "I\'d like a bacon cheeseburger with a lettuce wrap." B: "$6.50."' },
                  { dialogue: 'A: "What\'s your spiciest item?" B: "Ghost pepper wings." A: "10 with ranch." B: "$8.75."' }
                ]
              }
            },
            // 2: 正式餐厅预订
            {
              name: "正式餐厅预订",
              level: "★★",
              variations: {
                beginner: [
                  { dialogue: 'A: "I\'d like to book a table for two." B: "What time?" A: "7 PM." B: "Your name?" A: "Smith." B: "OK, reserved."' },
                  { dialogue: 'A: "Can I reserve a table for Friday?" B: "How many?" A: "Four." B: "Time?" A: "8 PM." B: "Name?" A: "Jones."' },
                  { dialogue: 'A: "I need a table for tonight." B: "Sorry, we\'re full." A: "OK, thanks."' }
                ],
                intermediate: [
                  { dialogue: 'A: "I\'d like to book a table for two this Friday at 7." B: "Let me check... yes, we have availability. Name?" A: "Smith." B: "Great, see you then."' },
                  { dialogue: 'A: "Can I reserve a table for six on Saturday at 8:30?" B: "We have one at 9, would that work?" A: "Yes, that\'s fine." B: "Name?" A: "Brown."' },
                  { dialogue: 'A: "I need to change my reservation from 7 to 8." B: "Certainly, what name?" A: "Davis." B: "Done."' }
                ],
                advanced: [
                  { dialogue: 'A: "I\'d like to book a table for a special occasion, maybe with a view." B: "We have a window table available at 7:30. Is that suitable?" A: "Perfect." B: "May I have your name?" A: "Wilson."' },
                  { dialogue: 'A: "Can I reserve the private dining room for 12 people next Thursday?" B: "Let me check... yes, it\'s available. Deposit required." A: "That\'s fine." B: "I\'ll email you details."' },
                  { dialogue: 'A: "I\'m calling to confirm my reservation for tonight at 7 under Miller." B: "Yes, we have it. Looking forward to seeing you."' }
                ]
              }
            },
            // 3: 餐厅点餐
            {
              name: "餐厅点餐",
              level: "★★",
              variations: {
                beginner: [
                  { dialogue: 'A: "Are you ready to order?" B: "Yes, I\'ll have the steak." A: "How would you like it?" B: "Medium." A: "Any sides?" B: "Fries."' },
                  { dialogue: 'A: "I\'ll take the chicken." B: "With rice or potatoes?" A: "Rice." B: "Drink?" A: "Water."' },
                  { dialogue: 'A: "I\'d like the pasta." B: "With meat sauce or marinara?" A: "Meat sauce."' }
                ],
                intermediate: [
                  { dialogue: 'A: "I\'ll have the ribeye steak, medium rare." B: "Any sides?" A: "Mashed potatoes and asparagus." B: "Excellent choice."' },
                  { dialogue: 'A: "I\'d like the salmon, grilled, with vegetables." B: "Would you like a salad with that?" A: "Yes, house salad."' },
                  { dialogue: 'A: "What do you recommend?" B: "The lamb chops are very popular." A: "I\'ll try those, medium." B: "Great."' }
                ],
                advanced: [
                  { dialogue: 'A: "I\'m debating between the filet mignon and the lobster tail." B: "May I suggest our surf and turf? Best of both." A: "That sounds perfect." B: "How would you like the steak?" A: "Medium-rare."' },
                  { dialogue: 'A: "Does the seafood pasta have any shellfish?" B: "Yes, it has shrimp and scallops." A: "I\'m allergic, so I\'ll have the chicken marsala instead." B: "Of course."' },
                  { dialogue: 'A: "I\'d like to start with the calamari, and for the main, the veal chop." B: "Excellent. How would you like the veal?" A: "Medium, please."' }
                ]
              }
            },
            // 4: 结账与AA制
            {
              name: "结账与AA制",
              level: "★★",
              variations: {
                beginner: [
                  { dialogue: 'A: "Can we get the check?" B: "Sure, together or separate?" A: "Together." B: "Here you go. $45."' },
                  { dialogue: 'A: "Check, please." B: "Separate?" A: "Yes, separate." B: "OK."' },
                  { dialogue: 'A: "How much do I owe?" B: "$22.50." A: "Here you go."' }
                ],
                intermediate: [
                  { dialogue: 'A: "Can we get the check?" B: "Sure, together or separate?" A: "Separate, we\'re doing Dutch."' },
                  { dialogue: 'A: "I\'ll pay for the drinks, you get the meal?" B: "Sounds fair. Let\'s split it that way."' },
                  { dialogue: 'A: "Let\'s split it evenly." B: "OK, that\'s $30 each."' }
                ],
                advanced: [
                  { dialogue: 'A: "Could we have separate checks?" B: "Of course. I\'ll bring them right away."' },
                  { dialogue: 'A: "I\'ve got this one, you can get the next." B: "You sure? Thanks!"' },
                  { dialogue: 'A: "Let\'s calculate exactly what each owes." B: "I already did – you owe $32, I owe $28."' }
                ]
              }
            },
            // 5: 抱怨与退货
            {
              name: "抱怨与退货",
              level: "★★★",
              variations: {
                beginner: [
                  { dialogue: 'A: "This steak is overcooked." B: "I\'m sorry, I\'ll get you a new one."' },
                  { dialogue: 'A: "This shirt is too small. Can I return it?" B: "Do you have the receipt?" A: "Yes, here." B: "OK, refund processed."' },
                  { dialogue: 'A: "My soup is cold." B: "I\'ll heat it up for you."' }
                ],
                intermediate: [
                  { dialogue: 'A: "I\'m sorry, but this steak is overcooked. I ordered medium-rare." B: "Oh, I apologize. Let me get you a new one."' },
                  { dialogue: 'A: "I\'d like to return this jacket. It doesn\'t fit." B: "Do you have the receipt?" A: "Yes, here." B: "I\'ll process the refund."' },
                  { dialogue: 'A: "This item is damaged. I\'d like a replacement." B: "I\'m sorry, we\'ll exchange it for you."' }
                ],
                advanced: [
                  { dialogue: 'A: "I\'m afraid this isn\'t what I ordered. I asked for the chicken, not the fish." B: "I\'m terribly sorry. I\'ll correct it immediately."' },
                  { dialogue: 'A: "I\'d like to speak to the manager. This service has been unacceptable." B: "I\'ll get her for you right away."' },
                  { dialogue: 'A: "The quality of this product is not what I expected. I\'d like a full refund." B: "Let me see what I can do. Do you have the receipt?"' }
                ]
              }
            },
            // 6: 机场值机与托运
            {
              name: "机场值机与托运",
              level: "★★",
              variations: {
                beginner: [
                  { dialogue: 'A: "Passport and ticket, please." B: "Here you go." A: "Any bags to check?" B: "One."' },
                  { dialogue: 'A: "Is this your bag?" B: "Yes." A: "Please put it on the scale." B: "OK."' },
                  { dialogue: 'A: "Window or aisle?" B: "Aisle, please." A: "Here\'s your boarding pass."' }
                ],
                intermediate: [
                  { dialogue: 'A: "Passport and ticket, please." B: "Here you go. I have one bag to check." A: "Any liquids or batteries?" B: "No." A: "Here\'s your boarding pass, gate 15."' },
                  { dialogue: 'A: "Your bag is a bit heavy. Would you like to take anything out?" B: "No, I\'ll pay the fee." A: "That\'ll be $50."' },
                  { dialogue: 'A: "Do you have a carry-on?" B: "Yes, just this backpack." A: "That\'s fine. Enjoy your flight."' }
                ],
                advanced: [
                  { dialogue: 'A: "I need to check in for the flight to London." B: "Certainly. May I see your passport?" A: "Here." B: "Would you prefer an aisle or window seat?" A: "Window, please."' },
                  { dialogue: 'A: "I\'m traveling with a golf bag. Do I need to check it?" B: "Yes, oversized items must be checked. There\'s a fee." A: "How much?" B: "$75."' },
                  { dialogue: 'A: "I\'d like to upgrade to business class if available." B: "Let me check... yes, there\'s one seat. It\'s $300 extra." A: "I\'ll take it."' }
                ]
              }
            },
            // 7: 安检对话
            {
              name: "安检对话",
              level: "★",
              variations: {
                beginner: [
                  { dialogue: 'A: "Please take out your laptop." B: "OK." A: "Put your bag on the belt." B: "Sure."' },
                  { dialogue: 'A: "Do I need to remove my shoes?" B: "No, keep them on."' },
                  { dialogue: 'A: "Empty your pockets." B: "OK." A: "You can go through."' }
                ],

          // 构建分类数据
          const categories = [
            { name: "餐饮与饮食", baseIndices: [0, 1, 2, 3, 4, 5] },

            { name: "医疗与紧急", baseIndices: [27, 28, 29, 30] }
          ];

          // 从localStorage读取用户统计数据
          let userStats;
          try {
            const savedStats = localStorage.getItem('english_user_stats_v7');
            userStats = savedStats ? JSON.parse(savedStats) : scenes.map(() => ({ failCount: 0, totalPractice: 0 }));
          } catch (e) {
            userStats = scenes.map(() => ({ failCount: 0, totalPractice: 0 }));
          }

          let proficiency;
          try {
            const savedProficiency = localStorage.getItem('english_proficiency_v7');
            proficiency = savedProficiency ? parseInt(savedProficiency) : 60;
          } catch (e) {
            proficiency = 60;

          function saveData() {
            try {
              localStorage.setItem('english_user_stats_v7', JSON.stringify(userStats));
              localStorage.setItem('english_proficiency_v7', proficiency.toString());

          }

          // 当前选中的场景基础索引、难度
          let currentBaseIndex = 0;
          let currentDifficulty = 'intermediate';
          let currentDialogue = '';
          let currentPractice = '';

          // DOM元素
          const categoryHomeView = document.getElementById('categoryHomeView');
          const categoryDetailView = document.getElementById('categoryDetailView');
          const detailView = document.getElementById('detailView');
          const categoryListEl = document.getElementById('categoryList');
          const categorySceneListEl = document.getElementById('categorySceneList');
          const backToCategoriesBtn = document.getElementById('backToCategoriesBtn');
          const currentCategoryNameEl = document.getElementById('currentCategoryName');
          const backBtn = document.getElementById('backBtn');
          const detailSceneName = document.getElementById('detailSceneName');
          const listenBtn = document.getElementById('listenBtn');
          const readBtn = document.getElementById('readBtn');
          const practiceBtn = document.getElementById('practiceBtn');
          const readPanel = document.getElementById('readPanel');
          const practicePanel = document.getElementById('practicePanel');
          const targetSentence = document.getElementById('targetSentence');
          const recordButton = document.getElementById('recordButton');
          const recognitionOutput = document.getElementById('recognitionOutput');
          const recognizedText = document.getElementById('recognizedText');
          const scoreDisplay = document.getElementById('scoreDisplay');
          const recommendationText = document.getElementById('recommendationText');
          const proficiencyDisplay = document.getElementById('proficiencyDisplay');
          const translateBtn = document.getElementById('translateBtn');
          const translationPanel = document.getElementById('translationPanel');
          const dictBtn = document.getElementById('dictBtn');
          const dictPanel = document.getElementById('dictPanel');

          let currentCategoryIndex = undefined;

          // 从对话中提取所有完整句子的辅助函数
          function extractAllSentences(dialogue) {
            const matches = dialogue.match(/[AB]:\s*"([^"]+)"/g);
            if (!matches) return [];
            return matches.map(m => {
              const inner = m.match(/"([^"]+)"/)[1];
              return inner;
            });
          }

          // 随机选择一个变体，并随机选择一个句子作为练习句
          function randomizeVariation() {
            const variations = scenes[currentBaseIndex].variations[currentDifficulty];
            const randomIndex = Math.floor(Math.random() * variations.length);
            const selected = variations[randomIndex];
            currentDialogue = selected.dialogue;
            
            // 从对话中提取所有句子
            const sentences = extractAllSentences(currentDialogue);
            if (sentences.length > 0) {
              // 随机选择一个句子
              const randomSentenceIndex = Math.floor(Math.random() * sentences.length);
              currentPractice = sentences[randomSentenceIndex];
            } else {
              // 保底：取整个对话（但通常不会发生）
              currentPractice = currentDialogue;
            }
            
            targetSentence.textContent = currentPractice;
            translationPanel.classList.remove('show');
            dictPanel.classList.remove('show');
          }

          // 设置难度
          function setDifficulty(level) {
            currentDifficulty = level;
            randomizeVariation();
            document.querySelectorAll('.difficulty-dot').forEach(dot => {
              const diff = dot.dataset.diff;
              if (diff === level) dot.classList.add('active');
              else dot.classList.remove('active');
            });
          }

          // 翻译函数
          async function myMemoryTranslate(text) {
            if (!text) return '';
            try {
              const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|zh`;
              const response = await fetch(url);
              if (!response.ok) throw new Error('翻译请求失败');
              const data = await response.json();
              return data.responseData.translatedText || text;
            } catch (error) {
              console.error('翻译失败:', error);
              return '（翻译服务暂时不可用）';
            }
          }

          // 词典查询函数
          async function queryDictionary(word) {
            if (!word || word.trim() === '') return '请输入单词';
            try {
              const response = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word)}`);
              if (!response.ok) {
                if (response.status === 404) return '未找到该单词';
                throw new Error('词典查询失败');
              }
              const data = await response.json();
              let html = `<div style="font-weight:bold; margin-bottom:10px;">${data[0].word}</div>`;
              if (data[0].phonetics && data[0].phonetics.length > 0) {
                const phonetic = data[0].phonetics.find(p => p.text) || data[0].phonetics[0];
                if (phonetic.text) html += `<div>🔊 音标: ${phonetic.text}</div>`;
                if (phonetic.audio) html += `<div><audio controls src="${phonetic.audio}"></audio></div>`;
              }
              data[0].meanings.forEach(meaning => {
                html += `<div style="margin-top:10px;"><em>${meaning.partOfSpeech}</em>`;
                meaning.definitions.slice(0, 2).forEach(def => {
                  html += `<div style="margin-left:15px;">• ${def.definition}</div>`;
                  if (def.example) html += `<div style="margin-left:30px; color:#666;">例: ${def.example}</div>`;
                });
                html += '</div>';
              });
              return html;
            } catch (error) {
              console.error(error);
              return '查询失败';
            }
          }

          // 渲染分类首页
          function renderCategoryHome() {
            categoryListEl.innerHTML = categories.map((cat, idx) => {
              const weakCount = cat.baseIndices.reduce((acc, baseIdx) => {
                return acc + (userStats[baseIdx]?.failCount >= 2 ? 1 : 0);
              }, 0);
              const badgeText = weakCount > 0 ? `⚠️ ${weakCount}个薄弱` : '';
              return `<li class="category-item" data-category-index="${idx}">
                <span>${cat.name}</span>
                ${badgeText ? `<span class="category-badge">${badgeText}</span>` : ''}
              </li>`;
            }).join('');
          }

          // 渲染分类详情（场景列表，按薄弱程度排序）
          function renderCategoryDetail(categoryIndex) {
            currentCategoryIndex = categoryIndex;
            const cat = categories[categoryIndex];
            currentCategoryNameEl.textContent = cat.name;
            const sceneItems = cat.baseIndices.map(baseIdx => ({
              baseIdx,
              name: scenes[baseIdx].name,
              level: scenes[baseIdx].level,
              failCount: userStats[baseIdx]?.failCount || 0
            }));
            sceneItems.sort((a, b) => b.failCount - a.failCount);
            categorySceneListEl.innerHTML = sceneItems.map(item => {
              const weakDot = item.failCount >= 2 ? '<span class="weak-dot">●</span>' : '';
              return `<li class="scene-item" data-base-index="${item.baseIdx}">
                <span class="scene-name">${item.name} ${item.level}</span>
                ${weakDot}
              </li>`;
            }).join('');
          }

          categoryListEl.addEventListener('click', (e) => {

              if (idx !== undefined) {

          categorySceneListEl.addEventListener('click', (e) => {

              if (baseIdx !== undefined) openDetail(parseInt(baseIdx));

          });

          // 返回分类首页
          backToCategoriesBtn.addEventListener('click', () => {
            categoryDetailView.classList.add('hidden');
            categoryHomeView.classList.remove('hidden');
            currentCategoryIndex = undefined;
          });

          // 打开场景详情
          function openDetail(baseIndex) {
            currentBaseIndex = baseIndex;
            detailSceneName.textContent = scenes[baseIndex].name;
            setDifficulty('intermediate'); // 随机选中级版本，并随机选句
            readPanel.classList.add('hidden');
            practicePanel.classList.add('hidden');
            recognitionOutput.classList.add('hidden');
            translationPanel.classList.remove('show');

            categoryHomeView.classList.add('hidden');

          // 返回上一级
          function goBackFromDetail() {
            detailView.classList.add('hidden');
            if (currentCategoryIndex !== undefined) {
              categoryDetailView.classList.remove('hidden');
              renderCategoryDetail(currentCategoryIndex);
            } else {
              categoryHomeView.classList.remove('hidden');
            }
            if (recognition && isRecording) {
              try { recognition.stop(); } catch (e) {}
              stopRecordingUI();
            }
            if ('speechSynthesis' in window) {
              window.speechSynthesis.cancel();

          }
          backBtn.addEventListener('click', goBackFromDetail);

          // 难度切换事件
          document.querySelectorAll('.difficulty-dot').forEach(dot => {
            dot.addEventListener('click', (e) => {
              const diff = e.target.dataset.diff;
              setDifficulty(diff);

          // 翻译按钮
          translateBtn.addEventListener('click', async () => {
            if (!currentDialogue) {
              translationPanel.textContent = '暂无对话可翻译';
              translationPanel.classList.add('show');
              return;
            }
            translateBtn.innerHTML = '🔤 翻译中... <span class="loading-spinner"></span>';

            translateBtn.innerHTML = '🔤 翻译';
          });

          // 词典查询按钮
          dictBtn.addEventListener('click', async () => {
            const word = prompt('请输入要查询的英文单词：', currentPractice ? currentPractice.split(' ')[0] : '');
            if (word) {
              dictBtn.innerHTML = '🔍 查询中... <span class="loading-spinner"></span>';
              const result = await queryDictionary(word);
              dictPanel.innerHTML = result;
              dictPanel.classList.add('show');
              dictBtn.innerHTML = '🔍 查词典';
            }
          });

          // 双击读文本区域查词
          readPanel.addEventListener('dblclick', async (e) => {
            const selection = window.getSelection();
            const word = selection.toString().trim();
            if (word && word.length > 0) {
              const result = await queryDictionary(word);
              dictPanel.innerHTML = result;
              dictPanel.classList.add('show');
            }
          });

          // 地道度更新
          function updateProficiency(delta) {
            proficiency = Math.min(100, Math.max(0, proficiency + delta));
            proficiencyDisplay.textContent = `地道度 ${Math.round(proficiency)}%`;
            saveData();
          }

          // 处理口语练习结果
          function handlePracticeResult(recognized, target) {
            if (!recognized.trim()) {
              userStats[currentBaseIndex].failCount++;
              updateProficiency(-1);
              showScore('再试试 👎', 'score-tryagain', '未能识别，请重试');
              saveData();
              renderCategoryHome();
              if (currentCategoryIndex !== undefined) renderCategoryDetail(currentCategoryIndex);
              return;
            }
            const normalize = s => s.toLowerCase().replace(/[^\w\s]/g, '').split(/\s+/).filter(w => w.length>0);
            const targetWords = normalize(target);
            const recognizedWords = normalize(recognized);
            const matched = targetWords.filter(w => recognizedWords.includes(w)).length;
            const matchRate = targetWords.length ? matched / targetWords.length : 0;
            let scoreText, className, delta;
            
            if (matchRate >= 0.8) {
              scoreText = '优秀 👍';
              className = 'score-excellent';
              delta = 2;
              if (userStats[currentBaseIndex].failCount > 0) userStats[currentBaseIndex].failCount--;
            } else if (matchRate >= 0.5) {
              scoreText = '良好 👌';
              className = 'score-good';
              delta = 1;
            } else {
              scoreText = '再试试 👎';
              className = 'score-tryagain';
              delta = -1;
              userStats[currentBaseIndex].failCount++;
            }
            userStats[currentBaseIndex].totalPractice++;
            
            updateProficiency(delta);
            showScore(scoreText, className, `识别: "${recognized}"`);
            saveData();
            renderCategoryHome();
            if (currentCategoryIndex !== undefined) renderCategoryDetail(currentCategoryIndex);
          }

          function showScore(scoreText, className, detail) {
            recognizedText.textContent = detail;
            scoreDisplay.innerHTML = `<span class="score-badge ${className}">${scoreText}</span>`;
            recognitionOutput.classList.remove('hidden');
          }

          // 语音识别
          let isRecording = false;
          let recognition = null;
          let webSpeechSupported = false;
          if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'en-US';
            webSpeechSupported = true;
          }

          let stopTimeout = null; // 停止超时定时器

          function startRecording() {
            if (!webSpeechSupported) {
              alert('您的浏览器不支持语音识别，使用模拟评分。');
              const rand = Math.random();
              let result;
              if (rand < 0.33) {
                result = { score: '优秀 👍', delta: 2, fail: false };
                if (userStats[currentBaseIndex].failCount > 0) userStats[currentBaseIndex].failCount--;
              } else if (rand < 0.66) {
                result = { score: '良好 👌', delta: 1, fail: false };
              } else {
                result = { score: '再试试 👎', delta: -1, fail: true };
              }
              if (result.fail) userStats[currentBaseIndex].failCount++;
              updateProficiency(result.delta);
              showScore(result.score, result.fail ? 'score-tryagain' : (result.delta===2?'score-excellent':'score-good'), '模拟识别(降级模式)');
              saveData();
              renderCategoryHome();
              if (currentCategoryIndex !== undefined) renderCategoryDetail(currentCategoryIndex);
              return;
            }

            if (isRecording) {
              // 正在录音，点击停止
              // 立即更新UI
              stopRecordingUI();
              // 清除之前的超时
              if (stopTimeout) {
                clearTimeout(stopTimeout);
                stopTimeout = null;
              }
              // 停止识别
              try {
                recognition.stop();
              } catch (e) {
                console.error('停止识别出错', e);
              }
              return;
            }

            try {
              recognition.start();
              isRecording = true;
              recordButton.textContent = '⏹️ 停止录音';
              recordButton.classList.add('recording');

              recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                handlePracticeResult(transcript, currentPractice);
                recognition.stop();
              };

              recognition.onerror = (e) => {
                console.error('识别错误', e);
                alert('录音出错，请重试。请确认麦克风权限已开启。');
                stopRecordingUI();
              };

              recognition.onend = () => {
                stopRecordingUI();
                if (stopTimeout) {
                  clearTimeout(stopTimeout);
                  stopTimeout = null;
                }
              };
            } catch (e) {
              alert('无法启动录音，请检查麦克风权限。');
              stopRecordingUI();
            }
          }

          function stopRecordingUI() {
            isRecording = false;
            recordButton.textContent = '🎙️ 开始录音';
            recordButton.classList.remove('recording');
          }

          // 每日推荐
          function setDailyRecommendation() {
            const today = new Date().getDay(); 
            // 星期天0 -> 26 (超市购物), 星期一1 -> 19 (办公室问候), 星期二2 -> 2 (正式餐厅预订), 星期三3 -> 5 (抱怨与退货), 星期四4 -> 12 (酒店退房), 星期五5 -> 0 (咖啡店), 星期六6 -> 6 (机场值机)
            const recMap = [26, 19, 2, 5, 12, 0, 6];
            let idx = recMap[today] || 0;
            if (userStats[idx] && userStats[idx].failCount >= 2) {
              idx = (idx + 1) % scenes.length;
            }
            recommendationText.textContent = `今日推荐： ${scenes[idx].name}`;
            recommendationText.dataset.recommendIndex = idx;
          }

          recommendationText.addEventListener('click', () => {
            const idx = recommendationText.dataset.recommendIndex;
            if (idx) openDetail(parseInt(idx));
          });

          // TTS 听对话
          listenBtn.addEventListener('click', () => {
            if (!('speechSynthesis' in window)) {
              alert("您的浏览器不支持语音播报功能");
              return;
            }
            if (!currentDialogue) return;
            
            window.speechSynthesis.cancel();

            let rate = 0.9;
            if (currentDifficulty === 'beginner') rate = 0.7;
            else if (currentDifficulty === 'advanced') rate = 1.0;

            let voices = [];
            try {
              voices = window.speechSynthesis.getVoices();
            } catch (e) {}
            let enVoices = voices.filter(v => v.lang.startsWith('en'));
            
            let voiceA = null, voiceB = null;
            if (enVoices.length >= 2) {
              voiceA = enVoices[0];
              voiceB = enVoices[1];
            } else if (enVoices.length === 1) {
              voiceA = voiceB = enVoices[0];
            } else if (voices.length > 0) {
              voiceA = voiceB = voices[0];
            }

            const parts = currentDialogue.split(/(A:|B:)/).filter(p => p.trim() !== '');
            let currentSpeaker = 'A';
            
            parts.forEach(part => {
              let text = part.trim();
              if (text === 'A:' || text === 'B:') {
                currentSpeaker = text.charAt(0);
              } else {
                text = text.replace(/^"|"$/g, '').trim();
                if (text.length > 0) {
                  const utterance = new SpeechSynthesisUtterance(text);
                  utterance.lang = 'en-US';
                  utterance.rate = rate;
                  if (currentSpeaker === 'A' && voiceA) utterance.voice = voiceA;
                  if (currentSpeaker === 'B' && voiceB) utterance.voice = voiceB;
                  window.speechSynthesis.speak(utterance);
                }
              }
            });
          });

          // 读文本
          readBtn.addEventListener('click', () => {
            const formattedDialogue = currentDialogue.replace(/\s+(A:|B:)/g, '\n$1');
            readPanel.innerHTML = formattedDialogue.split('\n').filter(line => line.trim() !== '').map(line => {
              if (line.trim().startsWith('A:')) return `<div class="dialogue-line"><span class="speaker">A:</span> ${line.slice(2)}</div>`;
              if (line.trim().startsWith('B:')) return `<div class="dialogue-line"><span class="speaker">B:</span> ${line.slice(2)}</div>`;
              return `<div class="dialogue-line">${line}</div>`;
            }).join('');
            readPanel.classList.remove('hidden');
            practicePanel.classList.add('hidden');
            translationPanel.classList.remove('show');
            dictPanel.classList.remove('show');
          });

          practiceBtn.addEventListener('click', () => {
            practicePanel.classList.remove('hidden');
            readPanel.classList.add('hidden');
            recognitionOutput.classList.add('hidden');
            translationPanel.classList.remove('show');
            dictPanel.classList.remove('show');
          });

          recordButton.addEventListener('click', startRecording);

          // 初始化
          renderCategoryHome();
          setDailyRecommendation();
          proficiencyDisplay.textContent = `地道度 ${proficiency}%`;

          window.goHome = goBackFromDetail;

        } catch (err) {
          console.error('初始化失败', err);
          const app = document.getElementById('app');
          if (app) {
            app.innerHTML = '<div style="text-align:center; padding:2rem; color:#721c24;">页面加载出错，请查看控制台错误信息</div>';
          }
        }
      });
    })();
  </script>
</body>
</html>
